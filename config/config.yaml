server:
  port: 19870
  mode: debug # debug, release, test

ipfs:
  status: false # 是否开启ipfs服务, 运行环境中没有ipfs会导致初始化失败

logger:
  level: debug
  path: "./logs"
  development: true
  rotation:
    enabled: true
    max_size: 100
    max_backups: 5
    max_age: 30
    compress: true
  other:
    path: "./logs/other"
    level: info
  categories:
    - name: http
      level: info
    - name: error
      level: error
    - name: business
      level: info
    - name: iam
      level: info
    - name: trafficresource
      level: info

